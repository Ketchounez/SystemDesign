services:
  hotel-booking-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    expose:
      - "8080"
    platform: linux/amd64
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/api/v1/hotels >/dev/null || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 25
      start_period: 15s

  gateway:
    build:
      context: ..
      dockerfile: docker/gateway.Dockerfile
    ports:
      - "8080:80"
    depends_on:
      hotel-booking-api:
        condition: service_healthy
