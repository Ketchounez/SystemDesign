services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hotel_booking
      POSTGRES_USER: hotel
      POSTGRES_PASSWORD: hotel
    ports:
      - "5432:5432"
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./data.sql:/docker-entrypoint-initdb.d/02_data.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hotel -d hotel_booking"]
      interval: 5s
      timeout: 5s
      retries: 20

  hotel-booking-api:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      POSTGRES_DSN: postgresql://hotel:hotel@postgres:5432/hotel_booking
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/api/v1/hotels >/dev/null || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 25
      start_period: 15s

  gateway:
    build:
      context: .
      dockerfile: docker/gateway.Dockerfile
    ports:
      - "8080:80"
    depends_on:
      hotel-booking-api:
        condition: service_healthy
