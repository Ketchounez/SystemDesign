services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hotel_booking
      POSTGRES_USER: hotel
      POSTGRES_PASSWORD: hotel
    ports:
      - "5432:5432"
    volumes:
      - ../schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ../data.sql:/docker-entrypoint-initdb.d/02_data.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hotel -d hotel_booking"]
      interval: 5s
      timeout: 5s
      retries: 20

  hotel-booking-api:
    container_name: hotel-booking-api
    build:
      context: ..
      dockerfile: docker/Dockerfile
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/api/v1/hotels >/dev/null || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 25
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy

  gateway:
    build:
      context: ..
      dockerfile: docker/gateway.Dockerfile
    ports:
      - "8080:80"
    depends_on:
      hotel-booking-api:
        condition: service_healthy

  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: hotel_booking_lab4
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ../mongo-init:/docker-entrypoint-initdb.d:ro
      - ..:/app:ro
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand('ping').ok\" | grep 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

volumes:
  mongo_data:
